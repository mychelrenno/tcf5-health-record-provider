spring.application.name=tcf5-health-record-provider

spring.datasource.url=jdbc:postgresql://localhost:5432/db_prontuarios
spring.datasource.username=admin
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8081/realms/tcf5-health

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs